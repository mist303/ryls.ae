<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ryls</title>
  <meta name="description" content="Trade routing intelligence. Coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #262526;
      --bg-card:  #2f2e30;
      --border:   #3a393b;
      --orange:   #ff5900;
      --orange-dim: rgba(255, 89, 0, 0.15);
      --white:    #f2f2f2;
      --muted:    #7a7780;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 2.5rem;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.01em;
      text-decoration: none;
    }

    .logo span { color: var(--orange); }

    .nav-link {
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-link:hover { color: var(--white); }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem 6rem;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(255,89,0,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--orange);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 1.5rem;
    }

    h1 .accent { color: var(--orange); }

    .tagline {
      font-size: clamp(1rem, 2vw, 1.15rem);
      color: var(--muted);
      font-weight: 300;
      max-width: 380px;
      line-height: 1.6;
      margin-bottom: 3.5rem;
    }

    /* ── FORM ── */
    .form-wrap {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 400px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .form-wrap input[type="email"] {
      flex: 1;
      min-width: 200px;
      padding: 0.8rem 1.1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-wrap input:focus { border-color: var(--orange); }
    .form-wrap input::placeholder { color: var(--muted); }

    .btn {
      padding: 0.8rem 1.5rem;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover  { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }

    .form-note {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.75rem;
      opacity: 0.65;
    }

    /* ── FOOTER ── */
    footer {
      padding: 1.75rem 2.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .footer-copy {
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.5;
    }

    .footer-links {
      display: flex;
      gap: 1.5rem;
    }

    .footer-links a {
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--white); }

    @media (max-width: 480px) {
      nav, footer { padding: 1.5rem 1.25rem; }
      footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="#">ryls<span>.</span></a>
  <a class="nav-link" href="mailto:hello@ryls.ae">Contact</a>
</nav>

<section class="hero">
  <div class="status">
    <span class="status-dot"></span>
    Coming soon
  </div>

  <h1>Route smarter.<br><span class="accent">Pay less.</span></h1>

  <p class="tagline">
    Trade finance routing intelligence for the UAE–China corridor.
  </p>

  <form class="form-wrap" onsubmit="handleSubmit(event)">
    <input type="email" placeholder="your@bank.ae" required autocomplete="email" />
    <button type="submit" class="btn">Get early access</button>
  </form>
  <p class="form-note">No spam · UAE banks and trade finance institutions only</p>
</section>

<footer>
  <span class="footer-copy">© 2026 ryls.ae</span>
  <div class="footer-links">
    <a href="https://github.com/mist303/ryls.ae" target="_blank" rel="noopener">GitHub</a>
    <a href="mailto:hello@ryls.ae">hello@ryls.ae</a>
  </div>
</footer>

<script>
  function handleSubmit(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const input = e.target.querySelector('input');
    btn.textContent = "You're on the list";
    btn.disabled = true;
    btn.style.opacity = '0.6';
    input.disabled = true;
  }
</script>

</body>
</html>
